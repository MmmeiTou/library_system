{% extends "base.html" %}

{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/signup_student.css' %}">
<script src="{% static 'js/signup_student.js' %}"></script>

<div class="register-container">
    <div class="register-box">
        <h2>🎓 学生注册</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}  <!-- Render form as <p> tags -->
            <button type="submit">注册</button>
        </form>
        <p>已有账号？ <a href="{% url 'login' %}">登录</a></p>
    </div>
</div>
{% endblock %}
