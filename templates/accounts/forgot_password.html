{% extends "base.html" %}

{% load static %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/forgot_password.css' %}">
<h2>Reset Password</h2>

<form method="post" class="password-reset-form">
  {% csrf_token %}
  {{ form.as_p }}
  
  <button type="submit" class="btn btn-primary">Next Step</button>
  
  <p class="form-footer">
    <a href="{% url 'login' %}" class="btn-link">Back to Login</a>
  </p>
</form>

{% endblock %}
