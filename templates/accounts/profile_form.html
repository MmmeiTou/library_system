{% extends "base.html" %}

{% load static %}

{% block title %}编辑个人资料 - 图书管理系统{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/profile_form.css' %}">
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3>编辑个人资料</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <h5>基本信息</h5>
                {{ user_form.as_p }}
                <h5>身份信息</h5>
                {{ profile_form.as_p }}
                <button type="submit" class="btn btn-success">保存修改</button>
                <a href="{% url 'profile_detail' %}" class="btn btn-secondary">取消</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
