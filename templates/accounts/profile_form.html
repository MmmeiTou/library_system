{% extends "base.html" %}

{% load static %}

{% block title %}Edit Profile - Library Management System{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/profile_form.css' %}">
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3>Edit Profile</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <h5>Basic Information</h5>
                {{ user_form.as_p }}
                <h5>Identity Information</h5>
                {{ profile_form.as_p }}
                <button type="submit" class="btn btn-success">Save Changes</button>
                <a href="{% url 'profile_detail' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
