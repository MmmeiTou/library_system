{% extends "base.html" %}

{% load static %}

{% block title %}Change Password - Library Management System{% endblock %}

{% block content %}
<script src="{% static 'js/password_change_form.js' %}"></script>
<link rel="stylesheet" href="{% static 'css/password_change_form.css' %}">

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3>Change Password</h3>
        </div>
        <div class="card-body">
            <form method="post" id="passwordChangeForm">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-warning">Confirm Change</button>
                <a href="{% url 'profile_detail' %}" class="btn btn-secondary">Back</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
