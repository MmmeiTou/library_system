{% extends "base.html" %}

{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/signup_librarian.css' %}">
<script src="{% static 'js/signup_librarian.js' %}"></script>

<div class="register-container">
    <div class="register-box">
        <h2>👤 Librarian Registration</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}  <!-- Render form fields as <p> tags with automatic name and value binding -->
            <button type="submit">Register</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="{% url 'login' %}">Go to Login</a>
        </p>
    </div>
</div>
{% endblock %}
