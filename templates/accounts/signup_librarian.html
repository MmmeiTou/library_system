{% extends "base.html" %}

{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/signup_librarian.css' %}">


<div class="register-container">
    <div class="register-box">
        <h2>👤 管理员注册</h2>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}  <!-- Render form fields as <p> tags with automatic name and value binding -->
            <button type="submit">注册</button>
        </form>

        <p class="login-link">
            已有账号？ <a href="{% url 'login' %}">前往登录</a>
        </p>
    </div>
</div>
{% endblock %}
