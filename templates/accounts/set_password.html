{% extends "base.html" %}

{% load static %}

{% block title %}设置新密码{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/set_password.css' %}">
<script src="{% static 'js/set_password.js' %}"></script>

<div class="password-container">
    <div class="password-box">
        <h2>🔐 设置新密码</h2>

        <!-- Display success or error messages -->
        {% if messages %}
            <div class="error-msg">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="input-group">
                <label>新密码</label>
                <input 
                    type="password" 
                    name="new_password1" 
                    placeholder="请输入新密码"
                    required
                >
            </div>
            
            <div class="input-group">
                <label>确认新密码</label>
                <input 
                    type="password" 
                    name="new_password2" 
                    placeholder="请再次输入新密码"
                    required
                >
            </div>
            
            <div class="hint">
                <i class="bi bi-info-circle"></i>
                密码至少4位，建议包含字母和数字组合
            </div>
            
            <button type="submit" class="btn-confirm">
                <i class="bi bi-check-circle me-2"></i>确认修改
            </button>
        </form>
    </div>
</div>
{% endblock %}
